apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: social-media-monorepo-ingress
  namespace: social-media-monorepo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  rules:
    - http:
        paths:
          - pathType: ImplementationSpecific
            path: /auth-api(/|$)(.*)
            backend:
              service:
                name: auth-api-service
                port:
                  number: 80
          - pathType: ImplementationSpecific
            path: /posts-api(/|$)(.*)
            backend:
              service:
                name: posts-api-service
                port:
                  number: 80
          - pathType: ImplementationSpecific
            path: /users-api(/|$)(.*)
            backend:
              service:
                name: users-api-service
                port:
                  number: 80
          - pathType: ImplementationSpecific
            path: /media-api(/|$)(.*)
            backend:
              service:
                name: media-api-service
                port:
                  number: 80
          - pathType: ImplementationSpecific
            path: /storage(/|$)(.*)
            backend:
              service:
                name: minio-service
                port:
                  number: 9000
          - pathType: ImplementationSpecific
            path: /()(.*)
            backend:
              service:
                name: web-app-service
                port:
                  number: 80
